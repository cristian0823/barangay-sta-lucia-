<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Borrowing - Barangay Sta. Lucia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #059669;
            --green-dark: #047857;
            --green-light: #d1fae5;
            --green-50: #f0fdf4;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f9fafb;
            --white: #ffffff;
        }

        [data-theme="dark"] {
            --text: #f1f5f9;
            --muted: #a7f3d0;
            --border: #14532d;
            --bg: #022c22;
            --white: #064e3b;
            --green-50: #0d2818;
            --green-light: #14532d;
        }

        [data-theme="dark"] input,
        [data-theme="dark"] textarea {
            background: #0d2818;
            color: var(--text);
            border-color: var(--border);
        }

        [data-theme="dark"] .equip-card {
            border-color: var(--border);
        }

        [data-theme="dark"] .progress-bar {
            background: #14532d;
        }

        [data-theme="dark"] .modal {
            background: #064e3b;
            color: var(--text);
        }

        [data-theme="dark"] .modal-equip-info {
            background: #0d2818;
            border-color: #14532d;
        }

        .dark-mode-toggle {
            background: rgba(255, 255, 255, .15);
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            width: 44px;
            text-align: center;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background .2s;
            color: white;
            line-height: 1;
        }

        .dark-mode-toggle:hover {
            background: rgba(255, 255, 255, .25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: white;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .15);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
        }

        .nav-brand img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .5);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, .85);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all .2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(255, 255, 255, .2);
            color: white;
        }

        .nav-links a#logoutBtn:hover {
            background: rgba(239, 68, 68, .3);
        }

        /* ── MAIN ── */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        h1.page-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        p.page-sub {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 28px;
        }

        /* ── STATS ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0, 0, 0, .05);
        }

        .stat-card .num {
            font-size: 36px;
            font-weight: 800;
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .stat-card.yellow .num {
            color: #d97706;
        }

        .stat-card.green .num {
            color: var(--green);
        }

        .stat-card.red .num {
            color: #dc2626;
        }

        /* ── SECTION TITLE ── */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── EQUIPMENT GRID ── */
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .equip-card {
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            transition: all .25s;
            cursor: default;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .05);
        }

        .equip-card.available:hover {
            border-color: var(--green);
            box-shadow: 0 8px 24px rgba(5, 150, 105, .12);
            transform: translateY(-3px);
        }

        .equip-card.unavailable {
            opacity: .6;
        }

        .equip-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .equip-icon {
            font-size: 40px;
        }

        .equip-avail {
            font-size: 22px;
            font-weight: 800;
            color: var(--green);
        }

        .equip-avail small {
            font-size: 14px;
            color: var(--muted);
            font-weight: 500;
        }

        .equip-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .equip-desc {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .4s;
        }

        .equip-avail-text {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .btn-request {
            width: 100%;
            padding: 11px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-request.active {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(5, 150, 105, .25);
        }

        .btn-request.active:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(5, 150, 105, .4);
        }

        .btn-request.disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }

        /* ── MY REQUESTS ── */
        .requests-section {
            background: var(--white);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .05);
        }

        .requests-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .requests-body {
            padding: 20px 24px;
        }

        .request-item {
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
            transition: box-shadow .2s;
        }

        .request-item:hover {
            box-shadow: 0 4px 12px rgba(0, 0, 0, .07);
        }

        .request-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .request-name {
            font-weight: 700;
            font-size: 15px;
        }

        .request-qty {
            font-size: 13px;
            color: var(--muted);
        }

        .request-dates {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .request-date-item {
            font-size: 13px;
        }

        .request-date-item span {
            color: var(--muted);
            font-size: 12px;
            display: block;
        }

        .request-purpose {
            font-size: 13px;
            color: #374151;
        }

        .btn-cancel {
            background: none;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            margin-top: 10px;
        }

        .btn-cancel:hover {
            background: #fef2f2;
        }

        /* ── STATUS BADGES ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .badge-pending {
            background: #fefce8;
            color: #a16207;
            border-color: #fde68a;
        }

        .badge-approved {
            background: var(--green-light);
            color: var(--green-dark);
            border-color: #a7f3d0;
        }

        .badge-rejected {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        .badge-returned {
            background: #f3f4f6;
            color: #374151;
            border-color: #d1d5db;
        }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: 20px;
            padding: 28px;
            width: 100%;
            max-width: 440px;
            margin: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
            animation: slideUp .25s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--muted);
            padding: 4px;
            border-radius: 6px;
        }

        .modal-close:hover {
            background: #f3f4f6;
        }

        .modal-equip-info {
            background: var(--green-50);
            border: 1px solid var(--green-light);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color .2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, .1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-submit-modal {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 4px 12px rgba(5, 150, 105, .25);
            margin-top: 4px;
        }

        .btn-submit-modal:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(5, 150, 105, .35);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 22px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            transform: translateY(100px);
            transition: transform .3s ease;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .15);
        }

        #toast.show {
            transform: translateY(0);
        }

        #toast.success {
            background: var(--green);
        }

        #toast.error {
            background: #dc2626;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .stats-row {
                grid-template-columns: repeat(3, 1fr);
            }

            nav {
                padding: 0 16px;
            }

            .nav-links a {
                padding: 5px 8px;
                font-size: 12px;
            }

            .main {
                padding: 16px;
            }

            h1.page-title {
                font-size: 22px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-brand">
            <img src="barangay.jpg" alt="Logo">
            <span>Barangay Services</span>
        </div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="equipment.html" class="active">Equipment</a>
            <a href="concerns.html">Concerns</a>
            <a href="court-scheduling.html">Booking</a>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">🌙</button>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <div class="main">
        <h1 class="page-title">🪑 Equipment Borrowing</h1>
        <p class="page-sub">Request barangay equipment for your events and activities</p>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card yellow">
                <div class="num" id="pendingCount">0</div>
                <div class="label">⏳ Pending</div>
            </div>
            <div class="stat-card green">
                <div class="num" id="approvedCount">0</div>
                <div class="label">✅ Approved</div>
            </div>
            <div class="stat-card red">
                <div class="num" id="rejectedCount">0</div>
                <div class="label">❌ Rejected</div>
            </div>
        </div>

        <!-- Available Equipment -->
        <div class="section-title">📦 Available Equipment</div>
        <div class="equipment-grid" id="equipmentGrid">
            <div class="empty-state">
                <div class="icon">📦</div>
                <p>Loading equipment...</p>
            </div>
        </div>

        <!-- My Requests -->
        <div class="requests-section">
            <div class="requests-header">
                <h2 style="font-size:18px;font-weight:700;">📋 My Equipment Requests</h2>
                <button onclick="loadMyRequests()"
                    style="background:none;border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;">🔄
                    Refresh</button>
            </div>
            <div class="requests-body" id="myRequestsList">
                <div class="empty-state">
                    <div class="icon">📋</div>
                    <p>Loading requests...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Borrow Modal -->
    <div class="modal-overlay" id="borrowModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Request Equipment</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-equip-info" id="modalEquipInfo"></div>
            <form id="borrowForm">
                <input type="hidden" id="modalEquipId">
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="borrowQty" min="1" value="1" required>
                    <p id="availableQtyNote" style="font-size:12px;color:var(--muted);margin-top:4px;"></p>
                </div>
                <div class="form-group">
                    <label>Purpose</label>
                    <textarea id="borrowPurpose" rows="3" placeholder="Describe the purpose of borrowing..."
                        required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Borrow Date</label>
                        <input type="date" id="borrowDate" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>Return Date</label>
                        <input type="date" id="returnDate" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit-modal" style="margin-top:18px;">✅ Submit Request</button>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/darkmode.js"></script>
    <script>
        // Auth check
        const currentUser = getCurrentUser();
        if (!currentUser) { window.location.href = 'login.html'; }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); logoutUser(); });

        // Toast
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `show ${type}`;
            setTimeout(() => toast.className = '', 3200);
        }

        let currentEquipId = null;
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('borrowDate').min = today;
        document.getElementById('returnDate').min = today;

        // Init
        (async function init() {
            await loadEquipment();
            await loadMyRequests();
            await updateStats();
        })();

        // Load equipment cards
        async function loadEquipment() {
            const list = await getEquipment();
            const grid = document.getElementById('equipmentGrid');
            if (!list || list.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>No equipment available</p></div>';
                return;
            }
            grid.innerHTML = list.map(item => {
                const pct = Math.round((item.available / item.quantity) * 100);
                const color = pct > 50 ? '#10b981' : pct > 25 ? '#f59e0b' : '#ef4444';
                const ok = item.available > 0;
                return `
                    <div class="equip-card ${ok ? 'available' : 'unavailable'}">
                        <div class="equip-card-header">
                            <span class="equip-icon">${item.icon}</span>
                            <span class="equip-avail">${item.available}<small>/${item.quantity}</small></span>
                        </div>
                        <div class="equip-name">${item.name}</div>
                        <div class="equip-desc">${item.description || ''}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${pct}%;background:${color};"></div>
                        </div>
                        <div class="equip-avail-text">${item.available} available</div>
                        <button class="btn-request ${ok ? 'active' : 'disabled'}"
                            ${!ok ? 'disabled' : `onclick="openModal(${item.id})"`}>
                            ${ok ? '📝 Request Equipment' : '❌ Not Available'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // Open modal
        async function openModal(equipId) {
            const list = await getEquipment();
            const item = list.find(e => e.id === equipId);
            if (!item) return;
            currentEquipId = equipId;
            document.getElementById('modalEquipId').value = equipId;
            document.getElementById('modalEquipInfo').innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;">
                    <span style="font-size:32px;">${item.icon}</span>
                    <div>
                        <div style="font-weight:700;font-size:15px;">${item.name}</div>
                        <div style="font-size:13px;color:var(--muted);">Available: ${item.available} / ${item.quantity}</div>
                    </div>
                </div>
            `;
            document.getElementById('availableQtyNote').textContent = `Maximum: ${item.available}`;
            document.getElementById('borrowQty').max = item.available;
            document.getElementById('borrowQty').value = 1;
            document.getElementById('borrowPurpose').value = '';
            document.getElementById('borrowDate').value = today;
            document.getElementById('returnDate').value = today;
            document.getElementById('borrowModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('borrowModal').classList.remove('open');
            currentEquipId = null;
        }

        // Close on overlay click
        document.getElementById('borrowModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

        // Submit borrow form
        document.getElementById('borrowForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const equipId = parseInt(document.getElementById('modalEquipId').value);
            const qty = parseInt(document.getElementById('borrowQty').value);
            const purpose = document.getElementById('borrowPurpose').value;
            const borrowDate = document.getElementById('borrowDate').value;
            const returnDate = document.getElementById('returnDate').value;

            if (returnDate < borrowDate) { showToast('Return date must be after borrow date', 'error'); return; }

            const result = await borrowEquipment(equipId, qty, borrowDate, returnDate, purpose);
            if (result.success) {
                showToast(result.message, 'success');
                closeModal();
                await loadEquipment();
                await loadMyRequests();
                await updateStats();
            } else {
                showToast(result.message, 'error');
            }
        });

        // Badge HTML
        function badgeHtml(status) {
            const map = {
                'pending': ['badge-pending', '⏳ Pending'],
                'approved': ['badge-approved', '✅ Approved'],
                'rejected': ['badge-rejected', '❌ Rejected'],
                'returned': ['badge-returned', '📦 Returned'],
            };
            const [cls, label] = map[status] || ['badge-pending', status];
            return `<span class="badge ${cls}">${label}</span>`;
        }

        // Load my borrowing requests
        async function loadMyRequests() {
            const list = await getMyBorrowings();
            const container = document.getElementById('myRequestsList');
            if (!list || list.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No equipment requests yet.</p></div>';
                return;
            }
            const sorted = [...list].sort((a, b) => new Date(b.borrowDate) - new Date(a.borrowDate));
            container.innerHTML = sorted.map(b => `
                <div class="request-item">
                    <div class="request-item-header">
                        <div>
                            <div class="request-name">🪑 ${b.equipment}</div>
                            <div class="request-qty">Quantity: ${b.quantity}</div>
                        </div>
                        ${badgeHtml(b.status)}
                    </div>
                    <div class="request-dates">
                        <div class="request-date-item"><span>Borrow Date</span>${formatDate(b.borrowDate)}</div>
                        <div class="request-date-item"><span>Return Date</span>${formatDate(b.returnDate)}</div>
                    </div>
                    <div class="request-purpose"><strong>Purpose:</strong> ${b.purpose}</div>
                    ${b.status === 'pending' ? `<button class="btn-cancel" onclick="cancelReq(${b.id})">❌ Cancel Request</button>` : ''}
                </div>
            `).join('');
        }

        async function cancelReq(id) {
            if (!confirm('Cancel this request?')) return;
            const result = await cancelBorrowingRequest(id);
            if (result.success) {
                showToast(result.message, 'success');
                await loadEquipment(); await loadMyRequests(); await updateStats();
            } else {
                showToast(result.message, 'error');
            }
        }

        async function updateStats() {
            const list = await getMyBorrowings();
            document.getElementById('pendingCount').textContent = list.filter(b => b.status === 'pending').length;
            document.getElementById('approvedCount').textContent = list.filter(b => b.status === 'approved').length;
            document.getElementById('rejectedCount').textContent = list.filter(b => b.status === 'rejected').length;
        }
    </script>
</body>

</html>
